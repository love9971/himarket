    #url: jdbc:mariadb://127.0.0.1:3306/portal_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: root
    password: J#^gkD$DZovEj7V6
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

db:
   host: 10.100.4.227
   port: 3306
   name: himarket
   username: root
   password: J#^gkD$DZovEj7V6

# Encryptor
encryption:
  root-key: portalmanagement

springdoc:
  api-docs:
    enabled: true
    path: /portal/v3/api-docs
  swagger-ui:
    path: /portal/swagger-ui.html
    disable-swagger-default-url: true
  packages-to-scan: com.alibaba.himarket.controller

jwt:
  secret: f0OnbLf28V4smHhNiokrw1jzotas+pz/as+CwBiHhWQ=
  expiration: 7d

acp:
  terminal-enabled: false
  default-provider: qwen-code
  default-runtime: remote
  remote:
    host: localhost
    port: 8098
  providers:
    qwen-code:
      display-name: Qwen Code
      command: qwen
      args: --acp
      compatible-runtimes:
        - REMOTE
      supports-custom-model: true
      supports-mcp: true
      supports-skill: true
    qodercli:
      display-name: Qoder CLI
      command: qodercli
      args: --acp
      compatible-runtimes:
        - REMOTE
      auth-options: default,personal_access_token
      auth-env-var: QODER_PERSONAL_ACCESS_TOKEN
    claude-code:
      display-name: Claude Code
      command: claude-agent-acp
      args: ${ACP_CLI_ARGS_CLAUDE:}
      compatible-runtimes:
        - REMOTE
      auth-env-var: ANTHROPIC_API_KEY
      supports-custom-model: true
      supports-mcp: true
      supports-skill: true
    opencode:
      display-name: OpenCode
      command: opencode
      args: acp
      compatible-runtimes:
        - REMOTE
      supports-custom-model: true
      supports-mcp: true
      supports-skill: true

observability:
  log-source: SLS

sls:
  # SLS服务端点（必填）
  # cn-chengdu.log.aliyuncs.com
  endpoint: ${SLS_ENDPOINT:}
  # 认证方式：STS 或 AK_SK
  auth-type: ${SLS_AUTH_TYPE:STS}
  # AK/SK认证方式的密钥（仅当 auth-type=AK_SK 时生效）
  access-key-id: ${SLS_ACCESS_KEY_ID:}
  access-key-secret: ${SLS_ACCESS_KEY_SECRET:}
  # 默认Project名称
  default-project: ${SLS_DEFAULT_PROJECT:apigateway-csb-cop}
  # 默认Logstore名称
  default-logstore: ${SLS_DEFAULT_LOGSTORE:apig-access-log}
  # AliyunLogConfig CR 配置
  aliyun-log-config:
    # CR所在的namespace
    namespace: ${SLS_ALIYUN_LOG_CONFIG_NAMESPACE:apigateway-system}
    # CR的名称
    cr-name: ${SLS_ALIYUN_LOG_CONFIG_CR_NAME:apigateway-access-log}
